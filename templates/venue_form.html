{% extends "layout.html" %}
{% block title %}{{ form_title }} — EventHub{% endblock %}
{% block content %}

<div class="form-page-header">
    <h1>{{ form_title }}</h1>
    <p>{{ 'Update venue details.' if venue else 'Add a new venue to use in your events.' }}</p>
</div>

<div class="card" style="max-width:720px;">
    <div class="card-body">
        <form method="POST" action="{{ form_action }}">
            <div class="form-group">
                <label for="name">Venue Name *</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ venue.name if venue else '' }}" placeholder="e.g. Downtown Conference Hall" required>
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <textarea class="form-control" id="address" name="address" rows="2" placeholder="Street address">{{ venue.address if venue else '' }}</textarea>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="city">City</label>
                    <input type="text" class="form-control" id="city" name="city" value="{{ venue.city if venue else '' }}" placeholder="City">
                </div>
                <div class="form-group col-md-6">
                    <label for="state">State</label>
                    <input type="text" class="form-control" id="state" name="state" value="{{ venue.state if venue else '' }}" placeholder="State">
                </div>
                <div class="form-group col-md-6">
                    <label for="zip_code">Zip Code</label>
                    <input type="text" class="form-control" id="zip_code" name="zip_code" value="{{ venue.zip_code if venue else '' }}" placeholder="ZIP">
                </div>
                <div class="form-group col-md-6">
                    <label for="capacity">Capacity</label>
                    <input type="number" class="form-control" id="capacity" name="capacity" value="{{ venue.capacity if venue else '' }}" placeholder="Max attendees" min="0">
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">{{ 'Update Venue' if venue else 'Create Venue' }}</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
