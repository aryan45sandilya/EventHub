{% extends "layout.html" %}
{% block title %}{{ form_title }} — EventHub{% endblock %}
{% block content %}

<div class="form-page-header">
    <h1>{{ form_title }}</h1>
    <p>{{ 'Update speaker details.' if speaker else 'Add a speaker to an event.' }}</p>
</div>

<div class="card" style="max-width:600px;">
    <div class="card-body">
        <form method="POST" action="{{ form_action }}">
            <div class="form-group">
                <label for="name">Speaker Name *</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ speaker.name if speaker else '' }}" placeholder="Full name" required>
            </div>
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea class="form-control" id="bio" name="bio" rows="3" placeholder="Short biography...">{{ speaker.bio if speaker else '' }}</textarea>
            </div>
            <div class="form-group">
                <label for="event_id">Assign to Event *</label>
                <select class="form-control" id="event_id" name="event_id" required>
                    <option value="" disabled {% if not speaker %}selected{% endif %}>Select an event</option>
                    {% for event in events %}
                        {% set sel = request.args.get('event_id', speaker.event_id if speaker else None) %}
                        <option value="{{ event.event_id }}" {% if sel and sel|int == event.event_id %}selected{% endif %}>
                            {{ event.name }} ({{ event.date.strftime('%Y-%m-%d') }})
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">{{ 'Update Speaker' if speaker else 'Add Speaker' }}</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
