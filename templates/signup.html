{% extends "layout.html" %}
{% block title %}Sign Up — EventHub{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-card-header" style="background:linear-gradient(135deg,#6C63FF,#EC4899);">
            <div class="auth-logo">✦</div>
            <h2>Create your account</h2>
            <p>Join EventHub to discover or host events</p>
        </div>
        <div class="auth-card-body">
            <form method="POST" action="{{ url_for('signup') }}">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Jane Smith" required>
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Min. 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
                </div>
                <input type="hidden" name="user_type" value="attendee">
                <button type="submit" class="btn btn-primary btn-block" style="margin-top:4px;">Create Account →</button>
            </form>
            <p class="text-center text-muted mt-3" style="font-size:.875rem;">
                Already have an account? <a href="{{ url_for('login') }}" style="color:var(--primary);font-weight:600;">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
