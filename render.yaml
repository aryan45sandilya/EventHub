services:
  - type: web
    name: eventhub
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python reset_database.py && python create_admin_users.py && python init_production_db.py
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_APP
        value: app.py
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
    # Persistent disk for SQLite database
    disk:
      name: eventhub-data
      mountPath: /opt/render/project/src
      sizeGB: 1
