services:
  - type: web
    name: eventhub
    runtime: python
    buildCommand: pip install -r requirements.txt && flask db upgrade && python create_admin_users.py
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_APP
        value: app.py
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
